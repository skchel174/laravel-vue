version: '3'

services:
  nginx:
    build:
      context: docker/nginx
    volumes:
      - ./:/var/www
    ports:
      - "8080:80"
    links:
      - php

  php:
    build:
      context: docker/php
    volumes:
      - ./:/var/www
    links:
      - mysql

  mysql:
    image: mysql:8.0
    platform: linux/x86_64
    volumes:
      - mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "33061:3306"

  mysql-testing:
    image: mysql:8.0
    platform: linux/x86_64
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "33062:3306"

  node:
    image: node:18.16-alpine
    volumes:
      - ./:/var/www
    ports:
      - "3000:3000"
    working_dir: /var/www
    tty: true

volumes:
  mysql:
