version: "3"

services:
  nginx:
    build:
      context: docker/nginx
    volumes:
      - ./:/var/www
    ports:
      - "8080:80"

  php-fpm:
    build:
      context: docker/php-fpm
    volumes:
      - ./:/var/www
    environment:
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}

  php-cli:
    build:
      context: docker/php-cli
    volumes:
      - ./:/var/www
    environment:
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    tty: true

  mysql:
    image: mysql:8.0
    platform: linux/x86_64
    volumes:
      - mysql:/var/lib/mysql
    environment:
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "33061:${DB_PORT}"

  node:
    image: node:22-alpine
    volumes:
      - ./:/var/www
    ports:
      - "${VITE_APP_PORT}:${VITE_APP_PORT}"
    working_dir: /var/www
    tty: true

volumes:
  mysql:
