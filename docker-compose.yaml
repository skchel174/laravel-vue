version: "3"

services:
  nginx:
    build:
      context: docker/nginx
    volumes:
      - ./:/var/www
    ports:
      - "8080:80"

  php-fpm:
    build:
      context: docker/php-fpm
    volumes:
      - ./:/var/www

  php-cli:
    build:
      context: docker/php-cli
    volumes:
      - ./:/var/www
    tty: true

  mysql:
    image: mysql:8.0
    platform: linux/x86_64
    volumes:
      - mysql:/var/lib/mysql
    environment:
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_DATABASE: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33061:3306"

volumes:
  mysql:
